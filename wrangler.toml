"$schema" = "./node_modules/wrangler/config-schema.json"
name = "discern-computer"
compatibility_date = "2026-03-29"

[assets]
not_found_handling = "single-page-application"
directory = "./dist"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
