<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=630">
  <title>og:image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1200px;
      height: 630px;
      background: #0a0a0a;
      font-family: 'Instrument Serif', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .grid {
      position: absolute;
      inset: -200px;
      background-image: 
        linear-gradient(to right, rgba(240, 236, 228, 0.12) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(240, 236, 228, 0.12) 1px, transparent 1px);
      background-size: 100px 100px;
      mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 30%, transparent 70%);
    }

    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    .logo {
      width: 120px;
      height: 120px;
      opacity: 0.95;
    }

    .logo svg {
      width: 100%;
      height: 100%;
    }

    h1 {
      font-size: 8rem;
      font-weight: 400;
      color: #f0ece4;
      letter-spacing: -0.03em;
      line-height: 0.95;
    }

    h1 em {
      font-style: italic;
      color: #6b6760;
    }

    .tagline {
      font-size: 1.75rem;
      font-style: italic;
      color: #6b6760;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <div class="grid"></div>

  <div class="content">
    <div class="logo">
      <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <g>
          <rect fill="#f0ece4" x="26.87" y="75.42" width="106.26" height="7.23"/>
          <rect fill="#f0ece4" x="75.42" y="26.91" width="7.23" height="106.17"/>
          <rect fill="#f0ece4" x="75.42" y="13.98" width="7.23" height="132.04" transform="translate(-33.42 79.31) rotate(-45)"/>
        </g>
      </svg>
    </div>
    <div>
      <h1>Discern <em>Co.</em></h1>
      <p class="tagline">see further.</p>
    </div>
  </div>
</body>
</html>
